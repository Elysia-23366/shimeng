<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>拾梦录 · 古风AI角色生成</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%; overflow: hidden;
      font-family: 'Noto Serif SC', 'STSong', serif;
      background: #08060f;
    }

    .bg {
      position: fixed; inset: 0; z-index: 0;
      overflow: hidden;
    }

    .bg-video {
      position: absolute;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      transform: translate(-50%, -50%);
      object-fit: cover;
      opacity: 0;
      transition: opacity 1.5s ease-in-out;
    }

    .bg-video.active {
      opacity: 1;
    }

    .bg-mask {
      position: absolute; inset: 0; z-index: 1;
      background: linear-gradient(
        to bottom,
        rgba(8,6,15,0.7) 0%,
        rgba(8,6,15,0.3) 50%,
        rgba(8,6,15,0.8) 100%
      );
    }

    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px;
    }

    .logo-container {
      margin-bottom: 48px;
      animation: fadeInDown 1s ease-out;
    }

    .logo-img {
      height: 120px;
      width: auto;
      filter: drop-shadow(0 8px 24px rgba(200,160,100,0.3));
    }

    .subtitle {
      font-size: 18px;
      font-weight: 300;
      color: rgba(255,240,210,0.6);
      letter-spacing: 0.5em;
      margin-bottom: 60px;
      text-align: center;
      animation: fadeInUp 1s ease-out 0.4s both;
    }

    .start-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 0 64px;
      height: 64px;
      background: linear-gradient(
        135deg,
        rgba(200,160,100,0.25) 0%,
        rgba(180,120,80,0.2) 100%
      );
      border: 1px solid rgba(220,180,120,0.6);
      border-radius: 8px;
      color: rgba(255,240,210,0.95);
      font-family: inherit;
      font-size: 20px;
      font-weight: 400;
      letter-spacing: 0.4em;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 32px rgba(200,160,100,0.2);
      animation: fadeInUp 1s ease-out 0.6s both;
      position: relative;
      overflow: hidden;
    }

    .start-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        135deg,
        rgba(220,180,120,0.15) 0%,
        rgba(200,140,100,0.1) 100%
      );
      opacity: 0;
      transition: opacity 0.3s;
    }

    .start-btn:hover::before {
      opacity: 1;
    }

    .start-btn:hover {
      transform: translateY(-4px);
      border-color: rgba(240,200,140,0.8);
      box-shadow: 0 16px 48px rgba(220,180,120,0.35);
    }

    .start-btn .icon {
      font-size: 16px;
      color: rgba(220,180,120,0.85);
      transition: color 0.3s;
    }

    .start-btn:hover .icon {
      color: rgba(240,200,140,1);
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .decoration {
      position: absolute;
      font-size: 12px;
      color: rgba(200,160,100,0.15);
      pointer-events: none;
    }

    .decoration.top-left {
      top: 80px;
      left: 80px;
      animation: float 4s ease-in-out infinite;
    }

    .decoration.top-right {
      top: 80px;
      right: 80px;
      animation: float 4s ease-in-out infinite 2s;
    }

    .decoration.bottom-left {
      bottom: 80px;
      left: 80px;
      animation: float 4s ease-in-out infinite 1s;
    }

    .decoration.bottom-right {
      bottom: 80px;
      right: 80px;
      animation: float 4s ease-in-out infinite 3s;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-20px);
      }
    }
  </style>
</head>
<body>
  <div class="bg">
    <video class="bg-video active" autoplay muted playsinline preload="auto">
      <source src="assets/shipin/1.mp4" type="video/mp4">
    </video>
    <video class="bg-video" muted playsinline preload="none">
      <source src="assets/shipin/2.mp4" type="video/mp4">
    </video>
    <video class="bg-video" muted playsinline preload="none">
      <source src="assets/shipin/3.mp4" type="video/mp4">
    </video>
    <div class="bg-mask"></div>
  </div>

  <div class="decoration top-left">✦</div>
  <div class="decoration top-right">✦</div>
  <div class="decoration bottom-left">✦</div>
  <div class="decoration bottom-right">✦</div>

  <div class="container">
    <div class="logo-container">
      <img class="logo-img" src="assets/logo.png" alt="拾梦录" />
    </div>

    <p class="subtitle">旧梦可拾，此刻成录</p>

    <button class="start-btn" id="startBtn">
      <span class="icon">✦</span>
      <span>开始体验</span>
      <span class="icon">✦</span>
    </button>
  </div>

  <script>
    const startBtn = document.getElementById('startBtn');
    const videos = document.querySelectorAll('.bg-video');
    let currentVideoIndex = 0;

    videos.forEach((video, index) => {
      video.addEventListener('loadeddata', () => {
        if (index === 0) {
          video.play();
        }
      });

      video.addEventListener('ended', () => {
        if (index === currentVideoIndex) {
          video.classList.remove('active');
          
          currentVideoIndex = (currentVideoIndex + 1) % videos.length;
          const nextVideo = videos[currentVideoIndex];
          
          nextVideo.currentTime = 0;
          nextVideo.classList.add('active');
          nextVideo.load();
          nextVideo.play();
        }
      });
    });
    
    startBtn.addEventListener('click', () => {
      window.location.href = 'step1.html';
    });
  </script>
</body>
</html>
